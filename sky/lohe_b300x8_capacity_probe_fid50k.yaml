name: un0-lohe-capacity-probe-fid50k

resources:
  accelerators: B300:8
  use_spot: false

workdir: .

setup: |
  set -euxo pipefail
  export PATH="$HOME/.local/bin:$PATH"
  uv sync --group dev --group logging --group eval

run: |
  set -euxo pipefail
  export PATH="$HOME/.local/bin:$PATH"
  nvidia-smi
  mkdir -p outputs/logs
  bash ablation_study/lohe_sweep.sh \
    --gpus all \
    --lohe-dims "4 8" \
    --anchors "32 64 128" \
    --dropouts "0.1" \
    --n-oscillators 4096 \
    --min-lr 2e-4 \
    --max-lr 2e-3 \
    --epochs 800 \
    --fid-every-epochs 400 \
    --fid-num-samples 50000 \
    --fid-batch-size 256 \
    --project cifar10_lohe_capacity_probe_fid50k \
    --output-root outputs/cifar10_lohe_capacity_probe_fid50k \
    --no-kill \
    > outputs/logs/cifar10_lohe_capacity_probe_fid50k.$(date +%Y%m%d_%H%M%S).log 2>&1
