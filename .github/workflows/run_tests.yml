name: run_tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"

      # ruff lives in the dev group; --no-install-project skips the heavy
      # CUDA torch wheel so linting stays fast and independent of the test job.
      - name: Install ruff
        run: uv sync --only-group dev --no-install-project

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Ruff lint
        run: uv run ruff check

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          # setup-uv prunes pre-built wheels from the cache by default
          # (`uv cache prune --ci`), assuming they're cheap to re-fetch. That
          # assumption is wrong for the 782 MB cu128 torch wheel: pruning shrinks
          # the cache to ~200 KB and every job re-downloads torch from the
          # PyTorch CDN. Keep the wheels so the cache (~1.5 GB) actually skips
          # the download on a hit.
          prune-cache: false
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run unit tests
        run: uv run pytest
